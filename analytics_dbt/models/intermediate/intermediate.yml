version: 2

models:
  - name: int_flights
    description: "Unified flight information from multiple sources. Grain: one row per flight_no + origin + destination + date"
    columns:
      - name: flight_no
        description: Flight number
        tests:
          - not_null
      - name: origin
        description: Origin airport
        tests:
          - not_null
      - name: destination
        description: Destination airport
        tests:
          - not_null
      - name: date
        description: Flight date
        tests:
          - not_null
      - name: time
        description: Flight time (nullable for wastage source)
      - name: load_id
        description: Load identifier (nullable for pax source)
      - name: source
        description: Data source identifier
        tests:
          - not_null
          - accepted_values:
              values: ['SCHEDULE', 'WASTAGE', 'SALES', 'PAYMENTS', 'PAX', 'ITEMS_LOAD']
      - name: rn
        description: Row number for deduplication
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - flight_no
            - origin
            - destination
            - date

  - name: int_hours
    description: "Reference table for hours 0-23. Grain: one row per hour. This table is created in int to use it as base for the dim_hours"
    columns:
      - name: hour
        description: Hour of day (0-23)
        tests:
          - not_null
          - unique

  - name: int_line_route
    description: "Preparation table for merging into fresh_food_order_sale by load_id. Represents a catering line including the route info"
    columns:
      - name: line_id
        description: "Catering line id used for flights grouping"
        tests:
          - not_null
      - name: load_id
        description: "Load id (set of trolleys) to be loaded to the catering line"
        tests:
          - not_null:
              where: "potential_error is null"
          - unique
      - name: connected_flights
        description: "Flights to be catered together. This route is built by combining all flights by line_id"
        tests:
          - not_null
      - name: route
        description: "Cities map representing the entire flight route catered together. his route is built by combining all flights by line_id"
        tests:
          - not_null

  - name: int_flight_load
    description: "Intermediate table mapping individual flight instances to their corresponding load_id. Grain: one row per flight_no + date + time"
    columns:
      - name: line_id
        description: "Catering line id used for flights grouping"
        tests:
          - not_null
      - name: flight_number
        description: "Flight number"
        tests:
          - not_null
      - name: origin
        description: "Origin airport"
        tests:
          - not_null
      - name: destination
        description: "Destination airport"
        tests:
          - not_null
      - name: date
        description: "Flight date"
        tests:
          - not_null
      - name: time
        description: "Flight departure time"
        tests:
          - not_null
      - name: load_id
        description: "Load identifier (set of trolleys) associated with the flight's catering line"
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - flight_number
            - date
            - time


